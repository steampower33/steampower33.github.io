                    <h2 id="1-문제"><a href="#1-문제" class="headerlink" title="1. 문제"></a>1. 문제</h2><p><a target="_blank" rel="external nofollow noopener noreferrer" href="https://www.acmicpc.net/problem/11650">좌표 정렬하기</a><br><img width="800" alt="스크린샷 2020-02-12 오후 11 05 10" src="https://user-images.githubusercontent.com/20227720/74342066-37158800-4dec-11ea-918f-5037cb6d416d.png"></p>
<h2 id="2-해결"><a href="#2-해결" class="headerlink" title="2. 해결"></a>2. 해결</h2><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line"><span class="keyword">import</span> sys; <span class="built_in">input</span> = sys.stdin.readline <span class="comment"># 입력 빠르게.</span></span><br><span class="line">n = <span class="built_in">int</span>(<span class="built_in">input</span>()); loc = <span class="built_in">list</span>() <span class="comment"># 입력 및 위치 설정.</span></span><br><span class="line"><span class="keyword">for</span> _ <span class="keyword">in</span> <span class="built_in">range</span>(n): loc.append(<span class="built_in">list</span>(<span class="built_in">map</span>(<span class="built_in">int</span>, <span class="built_in">input</span>().split()))) <span class="comment"># 위치 넣기.</span></span><br><span class="line">loc.sort(key=<span class="keyword">lambda</span> dot: (dot[<span class="number">0</span>], dot[<span class="number">1</span>])) <span class="comment"># x를 먼저 기준, y를 그 다음 기준으로 정렬.</span></span><br><span class="line"><span class="keyword">for</span> [i, j] <span class="keyword">in</span> loc: print(i, j) <span class="comment"># 출력.</span></span><br></pre></td></tr></table></figure>
