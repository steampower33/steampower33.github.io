                    <h2 id="1-문제"><a href="#1-문제" class="headerlink" title="1. 문제"></a>1. 문제</h2><p><a target="_blank" rel="external nofollow noopener noreferrer" href="https://www.acmicpc.net/problem/6086">최대 유량</a><br><img width="802" alt="스크린샷 2020-02-14 오후 2 33 05" src="https://user-images.githubusercontent.com/20227720/74504244-ebbbc080-4f36-11ea-90e2-07cc499eecf0.png"></p>
<h2 id="2-현재-코드"><a href="#2-현재-코드" class="headerlink" title="2. 현재 코드"></a>2. 현재 코드</h2><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> sys</span><br><span class="line"><span class="keyword">from</span> collections <span class="keyword">import</span> defaultdict, deque</span><br><span class="line">INF = sys.maxsize</span><br><span class="line"></span><br><span class="line"><span class="comment">#bfs</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">bfs</span>(<span class="params">start, sink, parent</span>):</span></span><br><span class="line">    visited = defaultdict(<span class="keyword">lambda</span>:<span class="number">0</span>)</span><br><span class="line">    queue = deque()</span><br><span class="line">    queue.append(start)</span><br><span class="line">    visited[start] = <span class="number">1</span></span><br><span class="line">    <span class="keyword">while</span> queue:</span><br><span class="line">        u = queue.popleft()</span><br><span class="line">        <span class="keyword">for</span> ind <span class="keyword">in</span> pipe[u]:</span><br><span class="line">            val = pipe[u][ind]</span><br><span class="line">            <span class="keyword">if</span> visited[ind]:</span><br><span class="line">                <span class="keyword">continue</span></span><br><span class="line">            <span class="keyword">if</span> val &lt;= <span class="number">0</span>:</span><br><span class="line">                <span class="keyword">continue</span></span><br><span class="line">            queue.append(ind)</span><br><span class="line">            visited[ind] = <span class="number">1</span></span><br><span class="line">            parent[ind] = u</span><br><span class="line">    <span class="keyword">return</span> <span class="number">1</span> <span class="keyword">if</span> visited[sink] <span class="keyword">else</span> <span class="number">0</span></span><br><span class="line"></span><br><span class="line"><span class="comment">#ford_fulkerson</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">ford_fulkerson</span>(<span class="params">start, sink</span>):</span></span><br><span class="line">    parent = defaultdict(<span class="keyword">lambda</span>:-<span class="number">1</span>)</span><br><span class="line">    max_flow = <span class="number">0</span></span><br><span class="line">    <span class="keyword">while</span> bfs(start, sink, parent):</span><br><span class="line">        path_flow = INF</span><br><span class="line">        s = sink</span><br><span class="line">        <span class="comment">#최소를 찾고 찾으면 max_flow에 더해줌</span></span><br><span class="line">        <span class="keyword">while</span> s!=start:</span><br><span class="line">            path_flow = <span class="built_in">min</span>(path_flow, pipe[parent[s]][s])</span><br><span class="line">            s = parent[s]</span><br><span class="line">        max_flow += path_flow</span><br><span class="line">        v = sink</span><br><span class="line">        <span class="comment">#유량의 오고감으로 빼주고 더함으로써 그 통로의 유량을 설정.</span></span><br><span class="line">        <span class="keyword">while</span> v!=start:</span><br><span class="line">            u = parent[v]</span><br><span class="line">            pipe[u][v] -= path_flow</span><br><span class="line">            pipe[v][u] += path_flow</span><br><span class="line">            v = parent[v]</span><br><span class="line">    <span class="keyword">return</span> max_flow</span><br><span class="line"></span><br><span class="line"><span class="keyword">if</span> __name__ == <span class="string">&quot;__main__&quot;</span>:</span><br><span class="line"></span><br><span class="line">    sys.setrecursionlimit(<span class="number">10</span> ** <span class="number">6</span>)</span><br><span class="line">    pipe = defaultdict(<span class="keyword">lambda</span>: defaultdict(<span class="built_in">int</span>))</span><br><span class="line">    <span class="comment"># 네트워크 유량에서 방향이 없으므로</span></span><br><span class="line">    <span class="comment"># 양쪽 유량을 같은 값으로 초기화</span></span><br><span class="line">    <span class="keyword">for</span> i <span class="keyword">in</span> <span class="built_in">range</span>(<span class="built_in">int</span>(<span class="built_in">input</span>())):</span><br><span class="line">        a, b, c = <span class="built_in">map</span>(<span class="built_in">str</span>, <span class="built_in">input</span>().split())</span><br><span class="line">        pipe[a][b] += <span class="built_in">int</span>(c)</span><br><span class="line">        pipe[b][a] += <span class="built_in">int</span>(c)</span><br><span class="line"></span><br><span class="line">    print(ford_fulkerson(<span class="string">&#x27;A&#x27;</span>,<span class="string">&#x27;Z&#x27;</span>))</span><br><span class="line"></span><br><span class="line"></span><br></pre></td></tr></table></figure>
